<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Los Cacharritos | Auténtica Cocina Cubana en La Habana</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Los Cacharritos - Restaurante tradicional cubano en La Habana. Ropa vieja, mojitos, lechón asado y más. Reserva tu mesa vía WhatsApp.">
  <meta name="keywords" content="restaurante cubano, La Habana, comida cubana, Los Cacharritos, Los Kacharritos, mojito, ropa vieja, reservas">
  <meta name="author" content="Los Cacharritos">
  <meta property="og:title" content="Los Cacharritos | Cocina Cubana Auténtica">
  <meta property="og:description" content="Disfruta la verdadera sazón cubana en el corazón de La Habana">
  <meta property="og:type" content="restaurant">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Framer Motion (para animaciones suaves) -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    :root {
      --cuban-orange: #D2691E;
      --cuban-yellow: #F4A460;
      --cuban-green: #228B22;
      --cuban-cream: #FDF5E6;
      --cuban-red: #C41E3A;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--cuban-cream);
      overflow-x: hidden;
    }
    
    .font-display {
      font-family: 'Playfair Display', serif;
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--cuban-orange);
      border-radius: 5px;
    }
    
    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(210, 105, 30, 0.4); }
      50% { box-shadow: 0 0 40px rgba(210, 105, 30, 0.6); }
    }
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    
    .animate-pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .text-shadow {
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .hover-lift {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
    }
    .hover-lift:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px -15px rgba(210, 105, 30, 0.3);
    }
    
    .menu-card {
      background: linear-gradient(135deg, #ffffff 0%, #fafafa 100%);
      border: 1px solid rgba(210, 105, 30, 0.1);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #D2691E 0%, #F4A460 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      transform: translateX(400px);
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .toast.show {
      transform: translateX(0);
    }
    
    /* Loading Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Image hover zoom */
    .img-zoom-container {
      overflow: hidden;
    }
    .img-zoom {
      transition: transform 0.5s ease;
    }
    .img-zoom-container:hover .img-zoom {
      transform: scale(1.1);
    }
    
    /* Custom checkbox */
    .custom-checkbox {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid var(--cuban-orange);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
    }
    .custom-checkbox:checked {
      background: var(--cuban-orange);
    }
    .custom-checkbox:checked::after {
      content: '✓';
      position: absolute;
      color: white;
      font-size: 14px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cuban-orange': '#D2691E',
            'cuban-yellow': '#F4A460',
            'cuban-green': '#228B22',
            'cuban-cream': '#FDF5E6',
            'cuban-red': '#C41E3A',
            'cuban-dark': '#2C1810',
          },
          fontFamily: {
            'display': ['Playfair Display', 'serif'],
            'body': ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="antialiased text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { motion, AnimatePresence } = window.Motion;
    
    // --- Icon Components ---

        close: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,

        mapPin: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
        clock: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
        star: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,

        shoppingBag: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,

        instagram: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>,
        facebook: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>,
        plus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        minus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
        sun: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,

        arrowUp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      };
      return icons[name] || null;
    };
    
    // --- Toast Component ---
    const Toast = ({ message, type, isVisible, onClose }) => {
      useEffect(() => {
        if (isVisible) {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }
      }, [isVisible, onClose]);
      
      return (
        <div className={`toast ${isVisible ? 'show' : ''} ${type === 'success' ? 'border-l-4 border-cuban-green' : 'border-l-4 border-cuban-orange'}`}>
          <div className={`w-6 h-6 rounded-full flex items-center justify-center ${type === 'success' ? 'bg-cuban-green' : 'bg-cuban-orange'}`}>
            <Icon name={type === 'success' ? 'check' : 'info'} size={16} className="text-white" />
          </div>
          <span className="font-medium text-gray-800">{message}</span>
        </div>
      );
    };
    
    // --- Header Component ---
    const Header = ({ cartCount, onCartClick, onReservaClick, isDark, toggleTheme }) => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);
      
      const navItems = [
        { label: 'Inicio', href: '#inicio' },
        { label: 'Menú', href: '#menu' },
        { label: 'Galería', href: '#galeria' },
        { label: 'Reseñas', href: '#testimonios' },
        { label: 'Contacto', href: '#contacto' },
      ];
      
      return (
        <motion.header 
          initial={{ y: -100 }}
          animate={{ y: 0 }}
          className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${
            isScrolled ? 'bg-white/95 backdrop-blur-md shadow-lg py-3' : 'bg-transparent py-5'
          }`}
        >
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            <motion.a 
              href="#inicio"
              className="flex items-center gap-2"
              whileHover={{ scale: 1.05 }}
            >
              <span className={`text-2xl md:text-3xl font-display font-black tracking-tight ${
                isScrolled ? 'text-cuban-orange' : 'text-white'
              }`}>
                Los Cacharritos
              </span>
              <span className="hidden sm:inline-flex items-center px-2 py-1 rounded-full bg-cuban-yellow/20 text-xs font-bold text-cuban-orange border border-cuban-orange/20">
                🇨🇺 Kacharritos
              </span>
            </motion.a>
            
            {/* Desktop Nav */}
            <nav className="hidden md:flex items-center gap-8">
              {navItems.map((item) => (
                <a
                  key={item.label}
                  href={item.href}
                  className={`font-medium transition-colors hover:text-cuban-orange ${
                    isScrolled ? 'text-gray-700' : 'text-white/90 hover:text-white'
                  }`}
                >
                  {item.label}
                </a>
              ))}
            </nav>
            
            <div className="flex items-center gap-3">
              <button
                onClick={toggleTheme}
                className={`p-2 rounded-full transition-colors ${
                  isScrolled ? 'hover:bg-gray-100 text-gray-700' : 'hover:bg-white/10 text-white'
                }`}
              >
                <Icon name={isDark ? 'sun' : 'moon'} size={20} />
              </button>
              
              <button
                onClick={onCartClick}
                className={`relative p-2 rounded-full transition-colors ${
                  isScrolled ? 'hover:bg-gray-100 text-gray-700' : 'hover:bg-white/10 text-white'
                }`}
              >
                <Icon name="shoppingBag" size={22} />
                {cartCount > 0 && (
                  <span className="absolute -top-1 -right-1 w-5 h-5 bg-cuban-red text-white text-xs font-bold rounded-full flex items-center justify-center animate-pulse">
                    {cartCount}
                  </span>
                )}
              </button>
              
              <button
                onClick={onReservaClick}
                className="hidden md:flex items-center gap-2 bg-cuban-orange hover:bg-cuban-yellow text-white px-6 py-2.5 rounded-full font-semibold transition-all hover:shadow-lg hover:scale-105"
              >
                <Icon name="phone" size={18} />
                Reservar
              </button>
              
              <button
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                className={`md:hidden p-2 rounded-lg transition-colors ${
                  isScrolled ? 'hover:bg-gray-100' : 'hover:bg-white/10 text-white'
                }`}
              >
                <Icon name={mobileMenuOpen ? 'close' : 'menu'} size={24} />
              </button>
            </div>
          </div>
          
          {/* Mobile Menu */}
          <AnimatePresence>
            {mobileMenuOpen && (
              <motion.div
                initial={{ opacity: 0, height: 0 }}
                animate={{ opacity: 1, height: 'auto' }}
                exit={{ opacity: 0, height: 0 }}
                className="md:hidden bg-white border-t shadow-xl"
              >
                <nav className="flex flex-col p-4 space-y-2">
                  {navItems.map((item) => (
                    <a
                      key={item.label}
                      href={item.href}
                      onClick={() => setMobileMenuOpen(false)}
                      className="py-3 px-4 rounded-xl hover:bg-cuban-cream text-gray-800 font-medium transition-colors"
                    >
                      {item.label}
                    </a>
                  ))}
                  <button
                    onClick={() => {
                      setMobileMenuOpen(false);
                      onReservaClick();
                    }}
                    className="mt-4 w-full bg-cuban-orange text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2"
                  >
                    <Icon name="phone" size={20} />
                    Reservar Mesa
                  </button>
                </nav>
              </motion.div>
            )}
          </AnimatePresence>
        </motion.header>
      );
    };
    
    // --- Hero Component ---
    const Hero = ({ onReservaClick }) => {
      return (
        <section id="inicio" className="relative min-h-screen flex items-center justify-center overflow-hidden">
          {/* Background Image with Parallax */}
          <div 
            className="absolute inset-0 bg-cover bg-center bg-fixed"
            style={{
              backgroundImage: "url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80')"
            }}
          >
            <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70" />
          </div>
          
          {/* Decorative Elements */}
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <div className="absolute top-20 left-10 w-32 h-32 bg-cuban-orange/20 rounded-full blur-3xl animate-float" />
            <div className="absolute bottom-20 right-10 w-48 h-48 bg-cuban-yellow/20 rounded-full blur-3xl animate-float" style={{ animationDelay: '1s' }} />
          </div>
          
          <div className="relative z-10 max-w-5xl mx-auto px-4 text-center">
            <motion.div
              initial={{ opacity: 0, y: 30 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.8 }}
            >
              <span className="inline-block px-4 py-2 rounded-full bg-white/10 backdrop-blur-sm text-white/90 text-sm font-medium mb-6 border border-white/20">
                🏆 Mejor Restaurante Cubano 2024
              </span>
              
              <h1 className="font-display text-5xl md:text-7xl lg:text-8xl font-black text-white mb-6 text-shadow leading-tight">
                Los Cacharritos
              </h1>
              
              <p className="text-xl md:text-3xl text-white/90 font-light italic mb-4 font-display">
                Donde la tradición se saborea
              </p>

    // --- Back to Top Button ---
    const BackToTop = () => {
      const [isVisible, setIsVisible] = useState(false);
      
      useEffect(() => {
        const toggleVisibility = () => {
          setIsVisible(window.scrollY > 500);
        };
        window.addEventListener('scroll', toggleVisibility);
        return () => window.removeEventListener('scroll', toggleVisibility);
      }, []);
      
      const scrollToTop = () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      return (
        <AnimatePresence>
          {isVisible && (
            <motion.button
              initial={{ opacity: 0, scale: 0 }}
              animate={{ opacity: 1, scale: 1 }}
              exit={{ opacity: 0, scale: 0 }}
              onClick={scrollToTop}
              className="fixed bottom-8 right-8 z-40 w-14 h-14 bg-cuban-orange text-white rounded-full shadow-lg hover:bg-cuban-yellow transition-colors flex items-center justify-center"
            >
              <Icon name="arrowUp" size={24} />
            </motion.button>
          )}
        </AnimatePresence>
      );
    };
    
    // --- Main App Component ---
    const App = () => {
      const [cart, setCart] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isReservaOpen, setIsReservaOpen] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isDark, setIsDark] = useState(false);
      
      const showToast = useCallback((message, type = 'success') => {
        setToast({ show: true, message, type });
      }, []);
      
      const hideToast = useCallback(() => {
        setToast({ show: false, message: '', type: 'success' });
      }, []);
      
      const addToCart = (item) => {
        setCart(prev => {
          const existing = prev.find(i => i.id === item.id);
          if (existing) {
            return prev.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
          }
          return [...prev, { ...item, quantity: 1 }];
        });
        showToast(`${item.name} añadido al carrito`);
      };
      
      const updateQuantity = (id, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const newQty = Math.max(1, item.quantity + delta);
            return { ...item, quantity: newQty };
          }
          return item;
        }));
      };
      
      const removeFromCart = (id) => {
        setCart(prev => prev.filter(item => item.id !== id));
        showToast('Producto eliminado', 'info');
      };
      
      const handleCheckout = () => {
        const numero = '5356083109';
        let mensaje = `🛒 *Nuevo Pedido - Los Cacharritos*\n\n`;
        cart.forEach(item => {
          mensaje += `• ${item.name} x${item.quantity} - ${item.price * item.quantity} CUP\n`;
        });
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        mensaje += `\n*Total:* ${total} CUP\n\nGracias! 🇨🇺`;
        
        window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        setCart([]);
        setIsCartOpen(false);
        showToast('Redirigiendo a WhatsApp...');
      };
      
      const toggleTheme = () => {
        setIsDark(!isDark);
        document.body.style.backgroundColor = isDark ? '#FDF5E6' : '#1a1a1a';
        document.body.style.color = isDark ? '#1f2937' : '#f3f4f6';
      };
      
      return (
        <div className={`${isDark ? 'dark' : ''}`}>
          <Header 
            cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)}
            onCartClick={() => setIsCartOpen(true)}
            onReservaClick={() => setIsReservaOpen(true)}
            isDark={isDark}
            toggleTheme={toggleTheme}
          />
          
          <main>
            <Hero onReservaClick={() => setIsReservaOpen(true)} />
            <MenuSection addToCart={addToCart} />
            <Gallery />
            <Testimonials />
            <Location />
          </main>
          
          <Footer />
          
          <CartSidebar 
            isOpen={isCartOpen}
            onClose={() => setIsCartOpen(false)}
            cart={cart}
            updateQuantity={updateQuantity}
            removeFromCart={removeFromCart}
            onCheckout={handleCheckout}
          />
          
          <ReservationModal 
            isOpen={isReservaOpen}
            onClose={() => setIsReservaOpen(false)}
            showToast={showToast}
          />
          
          <Toast 
            message={toast.message}
            type={toast.type}
            isVisible={toast.show}
            onClose={hideToast}
          />
          
          <BackToTop />
          
          {/* Floating WhatsApp Button */}
          <motion.a
            href="https://wa.me/5356083109"
            target="_blank"
            initial={{ scale: 0 }}
            animate={{ scale: 1 }}
            whileHover={{ scale: 1.1 }}
            className="fixed bottom-8 left-8 z-40 w-16 h-16 bg-green-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:shadow-green-500/50 transition-shadow"
          >
            <Icon name="whatsapp" size={32} />
          </motion.a>
        </div>
      );
    };
    
    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
